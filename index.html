<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>MCUlist ✪</title>
<link rel="stylesheet" href="styles.css" />
</head>
<body>
<!-- PIN screen -->
<section id="lockScreen" class="lock-screen">
<h1>✪ MCUlist</h1>
<p id="lockText"></p>
<input id="pinInput" type="password" inputmode="numeric" maxlength="12" placeholder="Enter PIN (numbers only)" />
<button id="pinBtn" class="btn">Continue</button>
</section>

<!-- App -->
<div id="app" class="app hidden">
<header class="topbar">
<h1>✪ MCUlist</h1>
<div class="top-controls">
<button id="themeBtn" class="btn">Toggle Light/Dark</button>
<button id="clearAllBtn" class="btn danger">Clear All Data</button>
</div>
</header>

<main>
<ul id="movieList" class="movie-list"></ul>
</main>
</div>

<script src="app.js"></script>
</body>
</html>
